<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajput Foods - Add New Item</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --primary: #2ecc71;
            --accent: #e67e22;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(at 0% 100%, rgba(230, 126, 34, 0.08) 0, transparent 50%);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .nav-brand {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 3rem;
            display: flex;
            align-items: center; gap: 10px;
        }

        .nav-item {
            color: var(--text-muted);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 12px;
            transition: 0.3s;
            display: flex;
            align-items: center; gap: 12px;
            margin-bottom: 8px;
        }

        .nav-item:hover, .nav-item.active { background: var(--glass); color: white; }
        .nav-item.active { border-left: 4px solid var(--primary); }

        /* --- Main Content --- */
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 3rem;
            display: flex;
            justify-content: center;
        }

        .form-container {
            width: 100%;
            max-width: 700px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 2.5rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .back-link {
            display: inline-block;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .back-link:hover { color: var(--primary); }

        h2 { margin: 0 0 2rem; font-size: 1.8rem; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group { margin-bottom: 1.5rem; }
        .full-width { grid-column: span 2; }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.1);
        }

        /* Image Preview Box */
        .image-preview {
            width: 100%;
            height: 200px;
            border-radius: 15px;
            background: rgba(0,0,0,0.2);
            border: 2px dashed var(--glass-border);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .image-preview img { width: 100%; height: 100%; object-fit: cover; }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.3s;
        }

        .btn-submit:hover { transform: translateY(-3px); filter: brightness(1.1); }
        
        select.form-control option { background: #1e293b; color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-brand">🥗 Rajput Foods</div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-item">📦 Products</a>
            <a href="orders.html" class="nav-item">📋 Orders</a>
            <a href="#" class="nav-item">📊 Analytics</a>
        </div>
        <div style="margin-top: auto;">
            <a href="#" id="logoutBtn" class="nav-item" style="color: #ef4444;">🚪 Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="form-container">
            <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
            
            <div class="glass-card">
                <h2>Add New Menu Item</h2>
                
                <form id="addProductForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Item Name</label>
                            <input type="text" id="productName" class="form-control" required placeholder="e.g., Paneer Tikka">
                        </div>

                        <div class="form-group">
                            <label>Price (INR)</label>
                            <input type="number" id="price" class="form-control" required placeholder="0.00">
                        </div>

                        <div class="form-group">
                            <label>Category</label>
                            <select id="category" class="form-control">
                                <option value="Starters">Starters</option>
                                <option value="Main Course">Main Course</option>
                                <option value="Desserts">Desserts</option>
                                <option value="Beverages">Beverages</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Image URL</label>
                            <input type="url" id="imageUrl" class="form-control" placeholder="https://example.com/food.jpg">
                        </div>

                        <div class="form-group full-width">
                            <label>Description</label>
                            <textarea id="description" class="form-control" rows="3" placeholder="Describe the flavors, spice level, and ingredients..."></textarea>
                        </div>
                    </div>

                    <label>Image Preview</label>
                    <div class="image-preview" id="previewContainer">
                        <span id="previewText" style="color: var(--text-muted);">Preview will appear here</span>
                        <img id="imgPreview" style="display: none;">
                    </div>

                    <button type="submit" class="btn-submit">Add to Menu</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/db.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initFirebase();
            Auth.checkAuth('admin');

            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) logoutBtn.addEventListener('click', Auth.logout);

            // --- Image Preview Logic ---
            const urlInput = document.getElementById('imageUrl');
            const previewImg = document.getElementById('imgPreview');
            const previewText = document.getElementById('previewText');

            urlInput.addEventListener('input', () => {
                const url = urlInput.value;
                if (url && url.startsWith('http')) {
                    previewImg.src = url;
                    previewImg.style.display = 'block';
                    previewText.style.display = 'none';
                } else {
                    previewImg.style.display = 'none';
                    previewText.style.display = 'block';
                }
            });

            // --- Form Submission ---
            const form = document.getElementById('addProductForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const user = firebase.auth().currentUser;
                if (!user) return;

                const submitBtn = form.querySelector('button');
                submitBtn.disabled = true;
                submitBtn.textContent = "Adding Item...";

                const productData = {
                    adminId: user.uid,
                    name: document.getElementById('productName').value,
                    price: parseFloat(document.getElementById('price').value),
                    category: document.getElementById('category').value,
                    description: document.getElementById('description').value,
                    imageUrl: document.getElementById('imageUrl').value || 'https://via.placeholder.com/300?text=Rajput+Foods'
                };

                try {
                    await DB.addProduct(productData);
                    alert('Delicious! Item added to your menu.');
                    window.location.href = 'dashboard.html';
                } catch (error) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Add to Menu";
                    alert('Error: ' + error.message);
                }
            });
        });
    </script>
</body>
</html>
