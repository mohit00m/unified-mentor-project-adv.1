<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajput Foods - Order Online</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <div class="nav-brand">Rajput Foods</div>
            <div class="nav-links">
                <a href="index.html" class="nav-item">Menu</a>
                <a href="profile.html" class="nav-item">Profile</a>
                <a href="#" class="nav-item active">My Orders</a>
                <a href="#" id="logoutBtn" class="nav-item" style="color: var(--error-color);">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container" style="padding: 2rem 0;">
        <h2 style="color: var(--primary-color);">Order History</h2>

        <div id="loading" style="text-align: center; padding: 2rem;">
            <p>Gathering your delicious history...</p>
        </div>

        <div id="ordersList">
            </div>

        <div id="emptyState" style="text-align: center; padding: 4rem; display: none;">
            <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">You haven't placed any orders yet.</p>
            <a href="index.html" class="btn btn-primary">Order Now</a>
        </div>
    </div>

    <script src="./js/firebase-config.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/db.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initFirebase();
            
            // Ensure user is logged in
            Auth.checkAuth('user');

            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) logoutBtn.addEventListener('click', Auth.logout);

            const ordersList = document.getElementById('ordersList');
            const loading = document.getElementById('loading');
            const emptyState = document.getElementById('emptyState');

            firebase.auth().onAuthStateChanged(async (user) => {
                if (user) {
                    try {
                        // Real-time listener: This will update the status instantly 
                        // when the admin clicks "Accept" or "Complete"
                        firebase.firestore().collection('orders')
                            .where('customerUid', '==', user.uid)
                            .onSnapshot((snapshot) => {
                                loading.style.display = 'none';
                                ordersList.innerHTML = ''; // Clear previous list

                                if (snapshot.empty) {
                                    emptyState.style.display = 'block';
                                    return;
                                }

                                emptyState.style.display = 'none';
                                
                                // Map and Sort by date (descending)
                                const orders = snapshot.docs.map(doc => ({ 
                                    id: doc.id, 
                                    ...doc.data() 
                                })).sort((a, b) => {
                                    const dateA = a.createdAt?.toDate() || 0;
                                    const dateB = b.createdAt?.toDate() || 0;
                                    return dateB - dateA;
                                });

                                orders.forEach(order => {
                                    const card = document.createElement('div');
                                    card.className = 'card';
                                    card.style.marginBottom = '1.5rem';

                                    const date = order.createdAt ? order.createdAt.toDate().toLocaleString() : 'Just now';
                                    const total = typeof formatCurrency === 'function' ? formatCurrency(order.totalAmount) : `₹${order.totalAmount}`;

                                    // Build items list
                                    let itemsHtml = '<ul style="margin: 0.5rem 0 0.5rem 1.5rem; color: var(--text-secondary);">';
                                    order.items.forEach(item => {
                                        itemsHtml += `<li>${item.quantity}x ${item.name}</li>`;
                                    });
                                    itemsHtml += '</ul>';

                                    // Status color logic
                                    const statusClass = order.status === 'COMPLETED' ? 'text-success' : 'text-primary';

                                    card.innerHTML = `
                                        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 0.8rem; margin-bottom: 0.8rem;">
                                            <strong>Order #${order.id.slice(0, 8).toUpperCase()}</strong>
                                            <span class="${statusClass}" style="font-weight: bold; font-size: 0.85rem; letter-spacing: 1px;">
                                                ${order.status}
                                            </span>
                                        </div>
                                        <p style="font-size: 0.85rem; color: #888;">Placed on: ${date}</p>
                                        <div style="margin: 1rem 0;">
                                            <strong>Items:</strong>
                                            ${itemsHtml}
                                        </div>
                                        <div style="text-align: right; border-top: 1px solid #f9f9f9; pt-2;">
                                            <span style="color: var(--text-secondary); font-size: 0.9rem;">Total Paid: </span>
                                            <span style="font-weight: bold; color: var(--primary-color); font-size: 1.1rem;">${total}</span>
                                        </div>
                                    `;
                                    ordersList.appendChild(card);
                                });
                            });

                    } catch (error) {
                        loading.innerHTML = `<p style="color: var(--error-color);">Error: ${error.message}</p>`;
                    }
                }
            });
        });
    </script>
</body>
</html>
