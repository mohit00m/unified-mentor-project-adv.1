<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Rajput Foods - Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --user-primary: #2ecc71;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            /* Soft green glow in the corner */
            background-image: radial-gradient(at 0% 0%, rgba(46, 204, 113, 0.1) 0, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .register-container {
            width: 100%;
            max-width: 500px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 2.5rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h2 { margin: 0; color: var(--user-primary); font-size: 2rem; }
        .header p { color: var(--text-muted); margin-top: 5px; }

        .form-group { margin-bottom: 1.2rem; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--user-primary);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.1);
        }

        textarea.form-control { resize: none; }

        .btn-register {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: 0.3s;
        }

        .btn-register:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 10px 20px rgba(46, 204, 113, 0.2); }

        .alert {
            display: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .alert-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }

        .footer-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .footer-link a { color: var(--user-primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="glass-card">
            <div class="header">
                <h2>Create Account</h2>
                <p>Order delicious food in seconds</p>
            </div>

            <div id="alertMessage" class="alert"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-control" required placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="email@example.com">
                </div>

                <div class="form-group">
                    <label>Delivery Address</label>
                    <textarea id="address" class="form-control" required rows="3" placeholder="Where should we deliver?"></textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control" required minlength="6" placeholder="••••••">
                    </div>
                    <div class="form-group">
                        <label>Confirm</label>
                        <input type="password" id="confirmPassword" class="form-control" required minlength="6" placeholder="••••••">
                    </div>
                </div>

                <button type="submit" class="btn-register" id="submitBtn">Create Account</button>
            </form>

            <div class="footer-link">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initFirebase === 'function') initFirebase();

            const form = document.getElementById('registerForm');
            const alertBox = document.getElementById('alertMessage');
            const submitBtn = document.getElementById('submitBtn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const address = document.getElementById('address').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                // Validation
                if (password !== confirmPassword) {
                    alertBox.textContent = "Passwords do not match!";
                    alertBox.className = "alert alert-error";
                    alertBox.style.display = "block";
                    return;
                }

                alertBox.style.display = "none";
                submitBtn.disabled = true;
                submitBtn.textContent = "Creating your account...";

                try {
                    await Auth.register(email, password, 'user', {
                        name: name,
                        address: address
                    });

                    // Success UI
                    submitBtn.style.background = "#2ecc71";
                    submitBtn.textContent = "Welcome to Rajput Foods!";
                    
                    setTimeout(() => {
                        window.location.href = 'index.html'; 
                    }, 1500);

                } catch (error) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Create Account";
                    alertBox.textContent = error.message;
                    alertBox.className = "alert alert-error";
                    alertBox.style.display = "block";
                }
            });
        }); 
    </script>
</body>
</html>
