<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Rajput Foods</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --primary: #2ecc71;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --error: #ef4444;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(at 100% 100%, rgba(46, 204, 113, 0.05) 0, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* --- Modern Navbar --- */
        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-content {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand { font-weight: 600; font-size: 1.3rem; color: var(--primary); }
        .nav-links { display: flex; gap: 2rem; }
        .nav-item { text-decoration: none; color: var(--text-muted); font-size: 0.9rem; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: var(--primary); }

        /* --- Profile Card --- */
        .profile-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 0 1rem;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 3rem;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .avatar-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.2);
        }

        .form-group { text-align: left; margin-bottom: 1.5rem; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .form-control:disabled { opacity: 0.6; cursor: not-allowed; background: rgba(0,0,0,0.2); }
        .form-control:focus:not(:disabled) {
            outline: none;
            border-color: var(--primary);
            background: rgba(255,255,255,0.08);
        }

        .btn-update {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.3s;
        }

        .btn-update:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .btn-logout {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--error);
            color: var(--error);
            border-radius: 12px;
            cursor: pointer;
            margin-top: 2rem;
            transition: 0.3s;
            font-family: inherit;
        }

        .btn-logout:hover { background: var(--error); color: white; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-brand">🥗 Rajput Foods</div>
            <div class="nav-links">
                <a href="customer-menu.html" class="nav-item">Menu</a>
                <a href="cart.html" class="nav-item">Cart</a>
                <a href="my-orders.html" class="nav-item">My Orders</a>
                <a href="#" class="nav-item active">Profile</a>
            </div>
        </div>
    </nav>

    <div class="profile-container">
        <div class="glass-card">
            <div class="avatar-circle" id="userInitial">👤</div>
            <h2 style="margin: 0 0 2rem;">Account Settings</h2>

            <form id="profileForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-control" disabled>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" disabled>
                </div>

                <div class="form-group">
                    <label>Delivery Address</label>
                    <textarea id="address" class="form-control" rows="3" placeholder="Set your default delivery address..."></textarea>
                </div>

                <button type="submit" class="btn-update">Update Profile</button>
            </form>

            <button id="logoutBtn" class="btn-logout">Log Out of Account</button>
        </div>
    </div>

    <script src="./js/firebase-config.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/auth.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initFirebase === 'function') initFirebase();
            Auth.checkAuth('user');

            const logoutBtn = document.getElementById('logoutBtn');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const addressInput = document.getElementById('address');
            const userInitial = document.getElementById('userInitial');

            // --- 1. Fetch & Display User Data ---
            firebase.auth().onAuthStateChanged(async (user) => {
                if (user) {
                    try {
                        // Assuming you have a function in db.js to get user data
                        // For now, using standard Firebase Auth display data
                        emailInput.value = user.email;
                        
                        // If you store address in Firestore, you'd fetch it here:
                        // const userData = await DB.getUserProfile(user.uid);
                        // nameInput.value = userData.name;
                        // addressInput.value = userData.address;
                        // userInitial.textContent = userData.name.charAt(0);

                    } catch (error) {
                        console.error("Error loading profile:", error);
                    }
                }
            });

            // --- 2. Update Logic ---
            const form = document.getElementById('profileForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const updateBtn = e.target.querySelector('button');
                updateBtn.textContent = "Saving Changes...";
                
                try {
                    // await DB.updateUserProfile(user.uid, { address: addressInput.value });
                    alert("Profile updated successfully!");
                } catch (error) {
                    alert("Error: " + error.message);
                } finally {
                    updateBtn.textContent = "Update Profile";
                }
            });

            // --- 3. Logout Logic ---
            if (logoutBtn) {
                logoutBtn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    if(confirm("Are you sure you want to log out?")) {
                        try {
                            await Auth.logout();
                            window.location.href = 'login.html'; 
                        } catch (error) {
                            console.error("Logout failed:", error);
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
